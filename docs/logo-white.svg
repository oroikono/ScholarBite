<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 0 160 180" width="160" height="180">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c27f"/>
      <stop offset="100%" style="stop-color:#e2a04f"/>
    </linearGradient>
  </defs>

  <g transform="translate(80, 90)">
    <!-- Book shadow -->
    <ellipse cx="2" cy="68" rx="68" ry="8" fill="#fff" opacity="0.05"/>

    <!-- Left page -->
    <path d="M-6,0 L-6,-58 Q-6,-65 -14,-65 L-62,-65 Q-68,-65 -68,-58 L-68,52 Q-68,58 -62,58 L-6,58 Z"
          fill="#ffffff" opacity="0.95" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

    <!-- Right page with bite -->
    <path d="M6,0 L6,-58 Q6,-65 14,-65 L42,-65
             Q36,-55 36,-44
             C36,-32 44,-22 52,-18
             C44,-12 38,-2 38,10
             C38,22 44,32 54,38
             L68,38 L68,52 Q68,58 62,58 L6,58 Z"
          fill="#f0f0f0" opacity="0.9" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

    <!-- Bite edge -->
    <path d="M42,-65 Q36,-55 36,-44 C36,-32 44,-22 52,-18 C44,-12 38,-2 38,10 C38,22 44,32 54,38"
          fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

    <!-- Tooth marks -->
    <path d="M39,-54 L43,-50" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M38,-30 L42,-27" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M40,-5 L44,-2" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M41,20 L45,23" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Crumbs -->
    <rect x="58" y="-60" width="10" height="7" rx="2.5" fill="#f0f0f0" opacity="0.7" transform="rotate(-20, 63, -56)"/>
    <rect x="64" y="-42" width="8" height="6" rx="2" fill="#fff" opacity="0.6" transform="rotate(15, 68, -39)"/>
    <rect x="60" y="-14" width="9" height="6" rx="2.5" fill="#e8e8e8" opacity="0.5" transform="rotate(-12, 64, -11)"/>
    <rect x="62" y="14" width="7" height="5" rx="2" fill="#f0f0f0" opacity="0.5" transform="rotate(22, 65, 16)"/>
    <circle cx="72" cy="-52" r="2.5" fill="#eee" opacity="0.5"/>
    <circle cx="75" cy="-24" r="2" fill="#eee" opacity="0.4"/>
    <circle cx="70" cy="4" r="2.5" fill="#eee" opacity="0.4"/>

    <!-- Spine -->
    <path d="M-6,-65 Q0,-72 6,-65 L6,58 Q0,63 -6,58 Z" fill="rgba(255,255,255,0.5)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

    <!-- Text lines left -->
    <line x1="-58" y1="-48" x2="-14" y2="-48" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="-36" x2="-18" y2="-36" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="-24" x2="-20" y2="-24" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="-12" x2="-14" y2="-12" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="0" x2="-22" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="12" x2="-16" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="24" x2="-20" y2="24" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="36" x2="-14" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-58" y1="48" x2="-18" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Text lines right (cut by bite) -->
    <line x1="14" y1="-48" x2="34" y2="-48" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="-36" x2="34" y2="-36" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="-24" x2="36" y2="-24" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="-12" x2="36" y2="-12" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="35" y2="0" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="38" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="24" x2="44" y2="24" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="36" x2="58" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="48" x2="58" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Graduation cap -->
    <g transform="translate(0, -72)">
      <polygon points="0,-18 52,0 0,12 -52,0" fill="url(#accent)"/>
      <circle cx="0" cy="-18" r="4.5" fill="url(#gold)"/>
      <path d="M0,-18 Q16,-12 18,4 Q19,14 15,24" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
      <rect x="11" y="21" width="8" height="12" rx="2" fill="url(#gold)"/>
      <line x1="13" y1="33" x2="13" y2="39" stroke="#e2a04f" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="15" y1="33" x2="15" y2="41" stroke="#e2a04f" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="17" y1="33" x2="17" y2="38" stroke="#e2a04f" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
